# ESP Component Registry manifest — https://components.espressif.com
# RisalDash is an Arduino-framework library. On ESP-IDF, use it together with arduino-esp32
# (Arduino as a component). Arduino IDE and PlatformIO users install it the usual way instead.
version: "0.11.0"
description: "Beautiful real-time web dashboards for ESP32 in a few lines of C++ — Zero-Waste UI (the linker strips unused widgets), offline AP + captive portal, WebSocket, i18n (EN/RU/UZ/AR + RTL) and AI control via MCP."
url: "https://dash.risal.io"
repository: "https://github.com/ziyarago/RisalDash.git"
documentation: "https://github.com/ziyarago/RisalDash/blob/main/README.md"
issues: "https://github.com/ziyarago/RisalDash/issues"
tags:
  - dashboard
  - web-ui
  - wifi
  - iot
  - websocket
  - captive-portal
targets:
  - esp32
  - esp32s2
  - esp32s3
  - esp32c3
  - esp32c6
dependencies:
  idf: ">=5.0"
# Ship only the library + examples + docs; leave the website, build slots and tooling out.
files:
  exclude:
    - "web/**/*"
    - "ci/**/*"
    - "dev/**/*"
    - "tools/**/*"
    - "docs/**/*"
    - "emulator/**/*"
    - "assets/**/*"
    - "lang/**/*"
    - ".github/**/*"
    - ".claude/**/*"
    - "**/.pio/**/*"
