name: build

on:
  push:
  pull_request:

# Compile every example for ESP32 and ESP8266 via PlatformIO. Each example is dropped into
# the ci/ project (which links the library through symlink://..) and built for both envs.
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example: [Minimal, FirstBoot, Layouts, Tabs, AllWidgets, Multilingual, SensorTemplates, WidgetSizes, FakeSensors]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('library.json') }}

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build ${{ matrix.example }} (ESP32 + ESP8266)
        run: |
          set -o pipefail   # without this, `| tee` would mask a failed build
          cp "examples/Any-ESP/${{ matrix.example }}/${{ matrix.example }}.ino" ci/src/main.cpp
          cd ci
          pio run -e esp32dev -e nodemcuv2 -e d1_mini 2>&1 | tee build.log

      - name: Size report — ${{ matrix.example }}
        if: always()
        run: |
          cd ci
          {
            echo "### Footprint — ${{ matrix.example }}"
            echo '```'
            grep -E 'Environment|RAM:|Flash:' build.log || echo 'no size lines'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
