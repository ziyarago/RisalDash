; Build-verification project for the RisalDash library (at ../).
; `pio run` compiles ci/src/main.cpp against the library for each board below.
; The async web server needs the platform-specific TCP backend (AsyncTCP on ESP32,
; ESPAsyncTCP on ESP8266) declared explicitly.
[platformio]
src_dir = src

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
    symlink://${PROJECT_DIR}/..
    esp32async/ESPAsyncWebServer
    esp32async/AsyncTCP

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
lib_deps =
    symlink://${PROJECT_DIR}/..
    esp32async/ESPAsyncWebServer
    esp32async/ESPAsyncTCP
