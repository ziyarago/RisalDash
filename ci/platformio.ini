; Build-verification project for the RisalDash library (at ../).
; `pio run` compiles a sketch against the library for each board below.
; The async web server needs the platform-specific TCP backend (AsyncTCP on ESP32,
; ESPAsyncTCP on ESP8266) declared explicitly.
;
; src/ holds TWO sketches, split per env by build_src_filter:
;   main.cpp        — generic all-widget build check (every board)
;   showcase_c6.cpp — the ESP32-C6-LCD-1.47 showcase (LCD + BLE + weather), esp32c6 only; a copy of
;                     examples/ESP32-C6-LCD-1_47's .ino with an Arduino.h include (kept .cpp so the
;                     build skips PlatformIO's fragile .ino conversion).
[platformio]
src_dir = src

; The CI exercises the optional MQTT export too (-D RISAL_ENABLE_MQTT + PubSubClient).
; All ESP32-family envs use the SAME pioarduino platform: the official espressif32 and the
; pioarduino fork fight over packages/tool-esptoolpy (one pip-installs esptool 5.x into the
; penv, the other overwrites it with the legacy 3.0 script layout) and keep breaking each
; other's builds. One platform → one esptool → stable builds.
[env:esp32dev]
build_src_filter = +<main.cpp>
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32dev
framework = arduino
build_flags = -D RISAL_ENABLE_MQTT
lib_deps =
    symlink://${PROJECT_DIR}/..
    esp32async/ESPAsyncWebServer
    esp32async/AsyncTCP
    knolleary/PubSubClient

[env:nodemcuv2]
build_src_filter = +<main.cpp>
platform = espressif8266
board = nodemcuv2
framework = arduino
build_flags = -D RISAL_ENABLE_MQTT
lib_deps =
    symlink://${PROJECT_DIR}/..
    esp32async/ESPAsyncWebServer
    esp32async/ESPAsyncTCP
    knolleary/PubSubClient

; Flashing a physical Wemos/LOLIN D1 mini (real-hardware testing). No MQTT flag — a lean
; first flash. Upload:  pio run -e d1_mini -t upload   Monitor:  pio device monitor -e d1_mini
[env:d1_mini]
build_src_filter = +<main.cpp>
platform = espressif8266
board = d1_mini
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    symlink://${PROJECT_DIR}/..
    esp32async/ESPAsyncWebServer
    esp32async/ESPAsyncTCP

; Waveshare ESP32-C6 (native USB-Serial/JTAG). The official espressif32 platform ships C6 as
; ESP-IDF only, so use the pioarduino fork for Arduino-on-C6. ESP32 uses AsyncTCP (not ESPAsyncTCP).
[env:esp32c6]
build_src_filter = +<showcase_c6.cpp>
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-c6-devkitm-1
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv   ; TLS (weather HTTPS) pushes the app past the 1.25 MB default
build_flags = -D ARDUINO_USB_CDC_ON_BOOT=1 -D ARDUINO_USB_MODE=1   ; Serial -> native USB-Serial/JTAG (HWCDC) on C6
    -D RISAL_MAX_WIDGETS=80   ; this showcase packs ~60 widgets across its pages (default 32)
lib_deps =
    symlink://${PROJECT_DIR}/..
    esp32async/ESPAsyncWebServer
    esp32async/AsyncTCP
    moononournation/GFX Library for Arduino@^1.5.0
    ricmoo/QRCode@^0.0.1
    olikraus/U8g2@^2.35.30   ; one compact Cyrillic font for real Russian LCD labels (--gc-sections keeps just it)

; ESP32-S3 (dual-core Xtensa) — the ESP32-S3-DualCore example. Same pioarduino platform (see above).
[env:esp32s3]
build_src_filter = +<main.cpp>
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags = -D ARDUINO_USB_CDC_ON_BOOT=1   ; Serial over the native USB
lib_deps =
    symlink://${PROJECT_DIR}/..
    esp32async/ESPAsyncWebServer
    esp32async/AsyncTCP
